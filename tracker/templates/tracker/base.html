<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}IronLog{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d0d0f;
      --surface:   #16161a;
      --surface2:  #1e1e24;
      --border:    #2a2a35;
      --accent:    #ff4d00;
      --accent2:   #ff7a3d;
      --text:      #e8e8ee;
      --muted:     #7a7a8c;
      --success:   #00c97a;
      --warning:   #ffd166;
      --danger:    #ff3860;
    }

    * { box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      padding: 0;
    }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .sidebar-logo .brand span {
      color: var(--accent);
    }

    .sidebar-logo .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .sidebar-nav {
      padding: 16px 12px;
      flex: 1;
    }

    .nav-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 12px 4px;
      margin-top: 8px;
    }

    .sidebar-nav .nav-link {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 10px 14px;
      border-radius: 8px;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 2px;
    }

    .sidebar-nav .nav-link:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .sidebar-nav .nav-link.active {
      color: var(--text);
      background: rgba(255, 77, 0, 0.12);
      border-left: 3px solid var(--accent);
    }

    .sidebar-nav .nav-link i { font-size: 1.1rem; width: 20px; }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Main content */
    .main-content {
      margin-left: 240px;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .page-header {
      padding: 40px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
      margin: 0;
    }

    .page-title span { color: var(--accent); }

    .page-body { padding: 32px 40px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
    }

    .card-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      border-radius: 12px 12px 0 0 !important;
      padding: 14px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Stat cards */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }

    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, rgba(255,77,0,0.12), transparent 70%);
    }

    .stat-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .stat-label {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat-icon {
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* Muscle badge */
    .muscle-badge {
      display: inline-block;
      background: rgba(255,77,0,0.12);
      border: 1px solid rgba(255,77,0,0.3);
      color: var(--accent2);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* Session row */
    .session-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.18s, transform 0.18s;
      text-decoration: none;
      color: inherit;
    }

    .session-row:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      color: inherit;
    }

    .session-date-block {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
      min-width: 56px;
      border: 1px solid var(--border);
    }

    .session-date-block .month {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .session-date-block .day-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    /* Buttons */
    .btn-accent {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 10px 22px;
      border-radius: 8px;
      transition: background 0.18s, transform 0.15s;
    }

    .btn-accent:hover {
      background: var(--accent2);
      color: #fff;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 8px;
      transition: all 0.18s;
    }

    .btn-ghost:hover {
      border-color: var(--text);
      color: var(--text);
      background: var(--surface2);
    }

    /* Form controls */
    .form-control, .form-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
    }

    .form-control:focus, .form-select:focus {
      background: var(--surface2);
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(255,77,0,0.15);
    }

    .form-control::placeholder { color: var(--muted); }
    .form-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* Checkbox muscle group */
    .muscle-check {
      display: none;
    }

    .muscle-check + label {
      display: inline-block;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.18s;
      margin: 3px;
    }

    .muscle-check:checked + label {
      background: rgba(255,77,0,0.15);
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Workout exercise card */
    .exercise-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 14px;
      overflow: hidden;
    }

    .exercise-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,77,0,0.04);
    }

    .exercise-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Set table */
    .set-table {
      width: 100%;
      border-collapse: collapse;
    }

    .set-table th {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .set-table td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }

    .set-table tr:last-child td { border-bottom: none; }

    .set-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      width: 36px;
    }

    .set-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.9rem;
      width: 80px;
      transition: border-color 0.15s;
    }

    .set-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(255,77,0,0.15);
    }

    .set-input.wide { width: 120px; }

    .unit-toggle {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .unit-toggle:hover, .unit-toggle.active {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* Alert / messages */
    .alert { border-radius: 8px; border: none; font-size: 0.9rem; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); width: 220px; }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .page-header { padding: 24px 20px 16px; flex-direction: column; align-items: flex-start; }
      .page-body { padding: 20px; }
    }

    .divider-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      position: relative;
      margin: 20px 0;
    }

    .divider-label::before, .divider-label::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider-label::before { left: 0; }
    .divider-label::after { right: 0; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state i {
      font-size: 3rem;
      display: block;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .toast-container { z-index: 9999; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <div class="brand"><span>Iron</span>Log</div>
      <div class="tagline">Gym Progress Tracker</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="bi bi-grid-1x2"></i> Dashboard
      </a>
      <a href="{% url 'session_list' %}" class="nav-link {% if 'session' in request.resolver_match.url_name %}active{% endif %}">
        <i class="bi bi-journal-text"></i> Workout Log
      </a>
      <div class="nav-label" style="margin-top:16px;">Quick Add</div>
      <a href="{% url 'session_new' %}" class="nav-link">
        <i class="bi bi-plus-circle"></i> New Session
      </a>
    </div>
    <div class="sidebar-footer">
      <i class="bi bi-activity me-1"></i> Track. Lift. Progress.
    </div>
  </nav>

  <!-- Mobile toggle -->
  <button class="btn btn-ghost d-md-none position-fixed" style="top:12px;left:12px;z-index:200" id="menuToggle">
    <i class="bi bi-list fs-4"></i>
  </button>

  <!-- Main -->
  <main class="main-content">
    {% if messages %}
    <div class="position-fixed top-0 end-0 p-3 toast-container">
      {% for message in messages %}
      <div class="toast show align-items-center text-white border-0 mb-2"
           style="background: {% if message.tags == 'success' %}var(--success){% elif message.tags == 'error' %}var(--danger){% else %}var(--accent){% endif %}; border-radius:8px;">
        <div class="d-flex">
          <div class="toast-body">{{ message }}</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
      {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('menuToggle')?.addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('open');
    });
    // Auto-dismiss toasts
    document.querySelectorAll('.toast').forEach(t => setTimeout(() => t.remove(), 4000));
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
