{% extends 'tracker/base.html' %}
{% block title %}Login — IronLog{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span>Iron</span>Log</div>
    <div class="auth-subtitle">Track. Lift. Progress.</div>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username"
               autocomplete="username" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-accent w-100" style="justify-content:center;padding:12px;">
        <i class="bi bi-lightning-charge"></i> Sign In
      </button>
    </form>

    <div class="divider-label" style="margin-top:24px;">New here?</div>

    <a href="{% url 'register' %}" class="btn-ghost w-100" style="justify-content:center;padding:11px;text-decoration:none;">
      <i class="bi bi-person-plus"></i> Create Account
    </a>
  </div>
</div>
{% endblock %}
